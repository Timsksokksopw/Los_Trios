<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Profile Card</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

  <div class="card">
    
    <div class="top-section">
      <h2 class="name">Name</h2>
      <div class="image-box">Bild</div>
    </div>

    <div class="info funfact">Fun Fact</div>
    <div class="info idol">Idole</div>
    <div class="spotify">Spotify</div>

  </div>
  <Style>
    body {
  background-color: #f0f0f0;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial, sans-serif;
}

.card {
  width: 250px;
  border: 4px solid black;
  padding: 20px;
  background-color: white;
}

.top-section {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.name {
  font-size: 24px;
  margin: 0;
}

.image-box {
  width: 70px;
  height: 100px;
  border: 4px solid black;
  display: flex;
  justify-content: center;
  align-items: center;
}

.info {
  border: 4px solid black;
  padding: 10px;
  margin-bottom: 15px;
  font-size: 18px;
}

.spotify {
  border: 4px solid black;
  padding: 20px;
  text-align: center;
  font-size: 20px;
}
  </Style>

</body>
</html>
